name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Lint, build & test
    runs-on: ubuntu-latest

    # No `services:` block. The e2e suite starts its own Postgres and Redis
    # through Testcontainers, so the database it tests against is created and
    # destroyed per run — the same code path a developer gets locally, rather
    # than a CI-only arrangement that can drift from it.
    env:
      NODE_ENV: test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      # The app connects as the unprivileged role created by the RLS
      # migration; migrations run as the owner. Using one connection for both
      # would silently disable every policy, since the owner is a superuser.
      # Placeholders only: the unit tests never connect, and the e2e suite
      # overwrites both from the container it starts.
      DATABASE_URL: postgresql://forge_app:forge_app@localhost:5433/forge?schema=public
      DATABASE_MIGRATION_URL: postgresql://forge:forge@localhost:5433/forge?schema=public
      # CI-only values. Real secrets live in the deployment environment.
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters-long
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      # Loosened so the functional e2e suites, which sign up and log in many
      # times, are not throttled. security.e2e-spec.ts sets a low limit of its
      # own to prove the 429.
      AUTH_THROTTLE_TTL_MS: 60000
      AUTH_THROTTLE_LIMIT: 100000
      # CI-only placeholders. No Stripe account is contacted: the e2e suite
      # stubs intent creation and signs its own webhook payloads with the
      # secret below, so verification is exercised for real against it.
      STRIPE_SECRET_KEY: sk_test_ci_placeholder_not_a_real_key
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder_not_a_real_secret
      # Worker (Sprint 5). No mail container is needed: the e2e suite replaces
      # MailService, so nothing connects to this host — but the env schema
      # still requires the vars, and a service that will not boot is a
      # confusing way to discover that.
      STORAGE_DIR: ./storage
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      MAIL_FROM: billing@forge.local
      # Observability. Tracing is deliberately OFF in CI: no collector runs
      # there, and an exporter retrying against a dead endpoint would add
      # noise and latency to every test without observing anything.
      LOG_LEVEL: warn
      OTEL_ENABLED: 'false'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` respects package-lock.json exactly — a drifting transitive
        # dependency should fail here, not surprise us in production.
        run: npm ci

      - name: Generate Prisma client
        # The generated client is gitignored, so nothing type-checks until it
        # exists. No database is needed for generation — only for migration.
        run: npx prisma generate

      - name: Lint
        run: npx eslint "{apps,libs,test}/**/*.ts"

      - name: Build all services
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: End-to-end tests
        run: npm run test:e2e

  images:
    name: Build service images
    runs-on: ubuntu-latest
    # Independent of the test job: a Dockerfile can break without a single test
    # failing, and a broken image is only discovered at deploy time otherwise.
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Validate the compose file
        # Resolves anchors, substitutions and service references. Catches a
        # broken stack definition without waiting for someone to run it.
        run: docker compose config --quiet

      - name: Build every service image
        # Built but not pushed — this proves the Dockerfiles compile and the
        # runtime stage resolves, which is what breaks in practice. Publishing
        # to a registry needs credentials and a versioning scheme, and belongs
        # with a real deployment pipeline rather than with CI on a branch.
        run: |
          set -euo pipefail
          for svc in gateway tenants-service contracts-service billing-service worker-service; do
            echo "::group::$svc"
            docker build -f "apps/$svc/Dockerfile" -t "forge-$svc:ci" .
            echo "::endgroup::"
          done

      - name: Confirm no .env was baked into an image
        # The reason .dockerignore exists: ConfigModule reads the .env *file* in
        # preference to the real environment, so a stray one in an image would
        # silently override injected secrets. Cheap to assert, catastrophic to
        # miss.
        run: |
          set -euo pipefail
          if docker run --rm --entrypoint sh forge-gateway:ci -c '[ -f /app/.env ]'; then
            echo "::error::.env is present inside the gateway image"
            exit 1
          fi
          echo "No .env in the image."
