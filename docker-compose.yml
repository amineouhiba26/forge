services:
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    ports:
      # Host port 5433 on purpose: a locally-installed Postgres commonly owns
      # 5432, and it wins the `localhost` race silently — you get a confusing
      # "role does not exist" instead of a connection error.
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # The apps depend on this condition, so `docker compose up` cannot race
      # a service's first query against a Postgres that is still starting.
      test: ['CMD-SHELL', 'pg_isready -U forge -d forge']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    # Persistence matters from Sprint 5 on: BullMQ jobs live in Redis, and the
    # chaos test in Sprint 7 kills this container and expects jobs to survive.
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: forge-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    container_name: forge-redisinsight
    restart: unless-stopped
    ports:
      - '5540:5540'
    depends_on:
      redis:
        condition: service_healthy

  # Catches every outbound email locally: SMTP on 1025, web UI on 8025.
  # Sprint 5 sends invoice emails, and a mail catcher means that path is
  # exercised for real — a stubbed transport would leave the one thing worth
  # testing (does an attachment actually get built and sent?) unproven.
  mailpit:
    image: axllent/mailpit:latest
    container_name: forge-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ['CMD', '/mailpit', 'readyz']
      interval: 5s
      timeout: 3s
      retries: 10

  # Trace collector and UI on 16686. `all-in-one` bundles the collector,
  # storage and query service in one container — right for local inspection,
  # wrong for production, where those scale separately.
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: forge-jaeger
    restart: unless-stopped
    ports:
      - '16686:16686' # web UI
      - '4318:4318' # OTLP over HTTP — what the services export to
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:16686',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
