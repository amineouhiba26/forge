services:
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    ports:
      # Host port 5433 on purpose: a locally-installed Postgres commonly owns
      # 5432, and it wins the `localhost` race silently — you get a confusing
      # "role does not exist" instead of a connection error.
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # The apps depend on this condition, so `docker compose up` cannot race
      # a service's first query against a Postgres that is still starting.
      test: ['CMD-SHELL', 'pg_isready -U forge -d forge']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: forge-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    # Persistence matters from Sprint 5 on: BullMQ jobs live in Redis, and the
    # chaos test in Sprint 7 kills this container and expects jobs to survive.
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: forge-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    container_name: forge-redisinsight
    restart: unless-stopped
    ports:
      - '5540:5540'
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
